version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: heritagecare-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: heritagecare

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: heritagecare-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://mongodb:27017/heritagecare
      NODE_ENV: development
      JWT_SECRET: your_jwt_secret_key_here
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: heritagecare-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      REACT_APP_API_BASE: http://localhost:5000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongodb_data:
